<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barantin Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <h2 class="sidebar-title">Practical Tools</h2>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active">Cookie</a>
          <a href="#" class="nav-item">Text Editor</a>
          <a href="#" class="nav-item">Card Key Splitter</a>
          <a href="#" class="nav-item">Html Image</a>
          <a href="#" class="nav-item">Link Html</a>
          <a href="#" class="nav-item">Merge Files</a>
          <a href="#" class="nav-item">JSON</a>
          <a href="#" class="nav-item">Account</a>
          <a href="#" class="nav-item">Fb Link</a>
        </nav>
      </aside>

      <main class="main-content">
        <div class="main-header">
          <h1 class="main-title">Cookie Handle Tools</h1>
          <div class="toggle-container">
            <span class="toggle-label">Extract UID</span>
            <label class="switch">
              <input type="checkbox" id="extractUidToggle" checked>
              <span class="slider round"></span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="cookieContent">Cookie Content</label>
          <textarea id="cookieContent" class="custom-textarea" rows="8"></textarea>
        </div>

        <button id="processBtn" class="primary-button">Processing Cookies</button>

        <div class="form-group">
          <label for="processingResults">Processing Results</label>
          <textarea id="processingResults" class="custom-textarea" rows="8" readonly></textarea>
        </div>
      </main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
